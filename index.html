<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sushi Mama</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --accent-green: #2ecc71;
            --secondary-bg: #2c2c2c;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            background-color: var(--card-bg);
            padding: 12px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .header h2 {
            font-family: 'Cinzel', serif;
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent-green);
        }

        .categories {
            display: flex;
            overflow-x: auto;
            padding: 15px 10px;
            gap: 8px;
            background-color: var(--card-bg);
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }

        .category-btn {
            padding: 10px 20px;
            background-color: var(--secondary-bg);
            border: none;
            border-radius: 25px;
            color: var(--text-sub);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .category-btn.active {
            background-color: var(--accent-green);
            color: #ffffff;
        }

        .menu-list {
            padding: 10px 16px 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .item-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        .item-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .item-info {
            padding: 25px;
        }

        /* --- СТИЛЬ НАЗВИ ЯК НА ПРИКЛАДІ --- */
        .item-name {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            color: var(--text-main);
            text-transform: uppercase; /* Тільки великі літери */
            letter-spacing: 2px;      /* Відступи між літерами */
            line-height: 1.3;
            border-left: 3px solid var(--accent-green); /* Декоративна лінія збоку */
            padding-left: 12px;
        }

        .item-desc {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 25px;
            line-height: 1.5;
            font-style: italic;
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-price {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .btn-add {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .counter {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: var(--secondary-bg);
            padding: 6px 6px 6px 18px;
            border-radius: 14px;
        }

        .counter-btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .footer-btn {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1rem;
            display: none;
            z-index: 2000;
            box-shadow: 0 15px 30px rgba(46, 204, 113, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="header"><h2>Sushi Mama | Меню</h2></div>
    <div id="categories" class="categories"></div>
    <div id="menu-list" class="menu-list"></div>
    <button id="main-btn" class="footer-btn" onclick="sendOrder()">Замовити</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let menuData = {};
        let cart = {};

        fetch('https://raw.githubusercontent.com/bezvodickiy/sushi-mama-app/main/menu_data.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => {
                menuData = data.reduce((acc, item) => {
                    if (!acc[item.category]) acc[item.category] = [];
                    acc[item.category].push(item);
                    return acc;
                }, {});
                renderCategories();
                renderMenu(Object.keys(menuData)[0]);
            });

        function renderCategories() {
            const container = document.getElementById('categories');
            container.innerHTML = '';
            Object.keys(menuData).forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = (e) => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    renderMenu(cat);
                };
                container.appendChild(btn);
            });
        }

        function renderMenu(category) {
            const list = document.getElementById('menu-list');
            list.innerHTML = '';
            if (!menuData[category]) return;

            menuData[category].forEach(item => {
                const count = cart[item.name] ? cart[item.name].count : 0;
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <img src="${item.image}" class="item-img" onerror="this.src='https://via.placeholder.com/400x200/262626/666666?text=Sushi+Mama'">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-desc">${item.description || 'Традиційний рецепт та свіжі інгредієнти'}</div>
                        <div class="item-footer">
                            <div class="item-price">${item.price} грн</div>
                            ${count > 0 ? `
                                <div class="counter">
                                    <span style="font-weight: 700; color:white;">${count}</span>
                                    <div style="display:flex; gap:5px;">
                                        <button class="counter-btn" onclick="updateCart('${item.name}', ${item.price}, -1)">-</button>
                                        <button class="counter-btn" onclick="updateCart('${item.name}', ${item.price}, 1)">+</button>
                                    </div>
                                </div>
                            ` : `<button class="btn-add" onclick="updateCart('${item.name}', ${item.price}, 1)">Додати +</button>`}
                        </div>
                    </div>`;
                list.appendChild(card);
            });
        }

        function updateCart(name, price, delta) {
            if (!cart[name]) cart[name] = { name, price, count: 0 };
            cart[name].count += delta;
            if (cart[name].count <= 0) delete cart[name];
            updateMainButton();
            renderMenu(document.querySelector('.category-btn.active').innerText);
        }

        function updateMainButton() {
            const btn = document.getElementById('main-btn');
            const total = Object.values(cart).reduce((sum, item) => sum + (item.price * item.count), 0);
            btn.style.display = total > 0 ? 'block' : 'none';
            btn.innerText = `Оформити замовлення — ${total} грн`;
        }

        function sendOrder() {
            tg.sendData(JSON.stringify(Object.values(cart)));
            tg.close();
        }
    </script>
</body>
</html>
