<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sushi Mama</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Raleway', sans-serif; background-color: #FCF9F1; color: #4A4941; margin: 0; padding: 0; }
        .categories { display: flex; overflow-x: auto; padding: 15px 5px; position: sticky; top: 0; background: #FCF9F1; z-index: 100; border-bottom: 1px solid #E4E0D5; scrollbar-width: none; }
        .category-item { padding: 8px 15px; margin: 0 5px; white-space: nowrap; font-size: 12px; font-weight: 600; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; }
        .category-item.active { color: #2B463C; border-bottom: 2px solid #2B463C; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 15px; padding-bottom: 100px; }
        .product-card { width: 100%; max-width: 400px; background: #fff; margin-bottom: 20px; border: 1px solid #E4E0D5; }
        .product-image { width: 100%; height: 250px; object-fit: cover; }
        .product-info { padding: 15px; }
        .product-title { font-family: 'Playfair Display', serif; font-size: 18px; color: #2B463C; margin-bottom: 5px; text-transform: uppercase; }
        .product-desc { font-size: 12px; color: #7A7970; margin-bottom: 15px; line-height: 1.4; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; }
        .price { font-weight: 700; color: #2B463C; font-size: 16px; }
        .add-btn { background: #2B463C; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 2px; font-weight: 600; }
        .counter { display: flex; align-items: center; border: 1px solid #2B463C; }
        .btn-c { background: none; border: none; padding: 8px 12px; font-weight: bold; color: #2B463C; cursor: pointer; font-size: 16px; }
        .count-val { padding: 0 10px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="categories" id="cat-bar"><div class="category-item active" id="btn-all" onclick="filterMenu('Всі', this)">Всі</div></div>
    <div class="container" id="main-cont"></div>

    <script>
        let allItems = []; 
        let cart = {}; 
        let currentCategory = 'Всі'; // Запам'ятовуємо категорію
        const tg = window.Telegram.WebApp;
        
        window.onload = function() {
            tg.ready(); tg.expand();
            tg.MainButton.setParams({ color: "#2B463C", text_color: "#FFFFFF" });
            
            fetch('menu_data.json?v=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    allItems = data;
                    const cats = [...new Set(data.map(i => i.category))];
                    cats.forEach(c => {
                        const d = document.createElement('div'); d.className = 'category-item';
                        d.innerText = c; d.onclick = (e) => filterMenu(c, e.target);
                        document.getElementById('cat-bar').appendChild(d);
                    });
                    render();
                });
        };

        function render() {
            const c = document.getElementById('main-cont'); 
            c.innerHTML = '';
            
            // Фільтруємо список згідно з обраною категорією
            const itemsToRender = currentCategory === 'Всі' 
                ? allItems 
                : allItems.filter(i => i.category === currentCategory);

            itemsToRender.forEach(i => {
                const count = cart[i.name] ? cart[i.name].count : 0;
                const card = document.createElement('div'); card.className = 'product-card';
                card.innerHTML = `
                    <img src="${i.image}" class="product-image" onerror="this.src='https://via.placeholder.com/400x300'">
                    <div class="product-info">
                        <div class="product-title">${i.name}</div>
                        <div class="product-desc">${i.description}</div>
                        <div class="product-footer">
                            <div class="price">${i.price} грн</div>
                            <div id="ctrl-${i.name.replace(/\s+/g, '')}">
                                ${count > 0 ? 
                                `<div class="counter"><button class="btn-c" onclick="change('${i.name}',${i.price},-1)">-</button><span class="count-val">${count}</span><button class="btn-c" onclick="change('${i.name}',${i.price},1)">+</button></div>` : 
                                `<button class="add-btn" onclick="change('${i.name}',${i.price},1)">ДОДАТИ +</button>`}
                            </div>
                        </div>
                    </div>`;
                c.appendChild(card);
            });
        }

        function change(n, p, d) {
            if(!cart[n]) cart[n] = {name:n, price:p, count:0};
            cart[n].count += d;
            if(cart[n].count <= 0) delete cart[n];
            render(); // Тепер рендер знає, яку категорію показувати
            updateBtn();
        }

        function updateBtn() {
            const vals = Object.values(cart);
            if(vals.length === 0) tg.MainButton.hide();
            else {
                const sum = vals.reduce((a, b) => a + (b.price * b.count), 0);
                tg.MainButton.setText(`ЗАМОВИТИ — ${sum} грн`);
                tg.MainButton.show();
            }
        }

        tg.onEvent('mainButtonClicked', function() {
            // Перевіряємо, чи є взагалі щось у кошику
            const cartValues = Object.values(cart);
            if (cartValues.length === 0) {
                tg.MainButton.hide();
                return;
            }

            tg.MainButton.showProgress();
            
            // Формуємо дані
            const resultData = JSON.stringify(cartValues);
            
            // Спроба відправки з обробкою через невеликий "пінок" для Telegram
            setTimeout(() => {
                try {
                    // Використовуємо sendData
                    tg.sendData(resultData);
                    
                    // Важливо: обнуляємо кошик і візуал ПЕРЕД закриттям
                    cart = {};
                    render();
                    
                    // Даємо ще трохи часу на пересилку пакетів даних
                    setTimeout(() => {
                        tg.MainButton.hideProgress();
                        tg.close();
                    }, 150);
                } catch (error) {
                    alert("Помилка відправки: " + error);
                    tg.MainButton.hideProgress();
                }
            }, 100);
        });
        function filterMenu(cat, el) {
            currentCategory = cat; // Оновлюємо поточну категорію
            document.querySelectorAll('.category-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render();
        }
    </script>
</body>
</html>
