<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sushi Mama Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            user-select: none;
        }
        .header { background: #2d2d2d; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .categories { display: flex; overflow-x: auto; padding: 10px; gap: 8px; background: #252525; scrollbar-width: none; }
        .category-btn { padding: 8px 15px; background: #3d3d3d; border: none; border-radius: 20px; color: white; white-space: nowrap; }
        .category-btn.active { background: #e67e22; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; padding-bottom: 90px; }
        .item-card { background: #2d2d2d; border-radius: 12px; overflow: hidden; border: 1px solid #3d3d3d; display: flex; flex-direction: column; }
        .item-img { width: 100%; height: 110px; object-fit: cover; }
        .item-info { padding: 8px; flex-grow: 1; }
        .item-name { font-size: 0.85rem; font-weight: bold; height: 2.2rem; overflow: hidden; }
        .item-price { color: #e67e22; font-weight: bold; margin-top: 5px; }
        .item-controls { padding: 8px; background: #353535; }
        .btn-add { width: 100%; background: #e67e22; color: white; border: none; padding: 8px; border-radius: 8px; font-weight: bold; }
        .counter { display: flex; align-items: center; justify-content: space-between; background: #3d3d3d; border-radius: 8px; padding: 4px; }
        .counter-btn { background: none; border: none; color: white; font-size: 1.2rem; width: 30px; height: 30px; }
        .footer-btn { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #e67e22; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; display: none; z-index: 1000; }
    </style>
</head>
<body>
    <div class="header"><h2 style="margin:0; color: #e67e22;">Sushi Mama 🍣</h2></div>
    <div id="categories" class="categories"></div>
    <div id="menu-grid" class="menu-grid"></div>
    <button id="main-btn" class="footer-btn" onclick="sendOrder()">Замовити</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let menuData = {};
        let cart = {};

        fetch('https://raw.githubusercontent.com/bezvodickiy/sushi-mama-app/main/menu_data.json')
            .then(res => res.json())
            .then(data => {
                menuData = data.reduce((acc, item) => {
                    if (!acc[item.category]) acc[item.category] = [];
                    acc[item.category].push(item);
                    return acc;
                }, {});
                renderCategories();
                renderMenu(Object.keys(menuData)[0]);
            })
            .catch(err => { document.getElementById('menu-grid').innerHTML = 'Помилка завантаження...'; });

        function renderCategories() {
            const container = document.getElementById('categories');
            Object.keys(menuData).forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = (e) => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    renderMenu(cat);
                };
                container.appendChild(btn);
            });
        }

        function renderMenu(category) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            menuData[category].forEach(item => {
                const count = cart[item.name] ? cart[item.name].count : 0;
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <img src="${item.image}" class="item-img" onerror="this.src='https://via.placeholder.com/150/2d2d2d/ffffff?text=Sushi'">
                    <div class="item-info"><div class="item-name">${item.name}</div><div class="item-price">${item.price} грн</div></div>
                    <div class="item-controls">
                        ${count > 0 ? `
                            <div class="counter">
                                <button class="counter-btn" onclick="updateCart('${item.name}', ${item.price}, -1)">-</button>
                                <span>${count}</span>
                                <button class="counter-btn" onclick="updateCart('${item.name}', ${item.price}, 1)">+</button>
                            </div>
                        ` : `<button class="btn-add" onclick="updateCart('${item.name}', ${item.price}, 1)">Додати</button>`}
                    </div>`;
                grid.appendChild(card);
            });
        }

        function updateCart(name, price, delta) {
            if (!cart[name]) cart[name] = { name, price, count: 0 };
            cart[name].count += delta;
            if (cart[name].count <= 0) delete cart[name];
            updateMainButton();
            renderMenu(document.querySelector('.category-btn.active').innerText);
        }

        function updateMainButton() {
            const btn = document.getElementById('main-btn');
            const total = Object.values(cart).reduce((sum, item) => sum + (item.price * item.count), 0);
            btn.style.display = total > 0 ? 'block' : 'none';
            btn.innerText = `Замовити: ${total} грн`;
        }

        function sendOrder() {
            tg.sendData(JSON.stringify(Object.values(cart)));
            tg.close();
        }
    </script>
</body>
</html>
