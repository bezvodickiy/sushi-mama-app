<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sushi Mama Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .product-card { width: 100%; max-width: 350px; background: #2c2c2c; border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .product-image { width: 100%; height: 250px; object-fit: cover; }
        .product-info { padding: 15px; }
        .product-title { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .product-desc { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; }
        .price { font-size: 18px; color: #ffcc00; font-weight: bold; }
        .add-btn { background: #ffcc00; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="container" style="width: 100%; max-width: 400px;"></div>

    <script>
        const container = document.getElementById('container');

        // Завантажуємо дані з твого JSON файлу
        fetch('menu_data.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${item.image}" class="product-image">
                        <div class="product-info">
                            <div class="product-title">${item.name}</div>
                            <div class="product-desc">${item.description}</div>
                            <div class="product-footer">
                                <div class="price">${item.price} грн</div>
                                <button class="add-btn">Додати +</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
