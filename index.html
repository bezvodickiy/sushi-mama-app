<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi Mama Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Темний фон */
            color: #ffffff; /* Білий текст */
            user-select: none;
        }

        .header {
            background-color: #2d2d2d;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .categories {
            display: flex;
            overflow-x: auto;
            padding: 10px;
            gap: 10px;
            background-color: #252525;
        }

        .category-btn {
            padding: 8px 15px;
            background-color: #3d3d3d;
            border: none;
            border-radius: 20px;
            color: white;
            white-space: nowrap;
            cursor: pointer;
        }

        .category-btn.active {
            background-color: #e67e22;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
            padding-bottom: 80px;
        }

        .item-card {
            background-color: #2d2d2d;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #3d3d3d;
        }

        .item-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .item-info {
            padding: 10px;
            flex-grow: 1;
        }

        .item-name {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .item-price {
            color: #e67e22;
            font-weight: bold;
        }

        .item-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background-color: #353535;
        }

        .btn-add {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .counter {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-btn {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        /* Стилі для коментаря та опису */
        .item-desc {
            font-size: 0.75rem;
            color: #aaaaaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; color: #e67e22;">Sushi Mama 🍣</h2>
    </div>

    <div id="categories" class="categories"></div>
    <div id="menu-grid" class="menu-grid"></div>

    <button id="main-btn" class="footer-btn" onclick="sendOrder()">
        Переглянути замовлення
    </button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        let menuData = [];
        let cart = {};

        // Завантаження меню з GitHub
        fetch('https://raw.githubusercontent.com/ВАШ_ЛОГІН/ВАШ_РЕПОЗИТОРІЙ/main/menu_data.json')
            .then(res => res.json())
            .then(data => {
                menuData = data;
                renderCategories();
                renderMenu(Object.keys(data)[0]);
            });

        function renderCategories() {
            const container = document.getElementById('categories');
            Object.keys(menuData).forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = (e) => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    renderMenu(cat);
                };
                container.appendChild(btn);
            });
        }

        function renderMenu(category) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            menuData[category].forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                const count = cart[item.name] ? cart[item.name].count : 0;
                
                card.innerHTML = `
                    <img src="${item.image}" class="item-img" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-desc">${item.weight || ''}</div>
                        <div class="item-price">${item.price} грн</div>
                    </div>
                    <div class="item-controls">
                        ${count > 0 ? `
                            <div class="counter">
                                <button class="btn-add" onclick="updateCart('${item.name}', ${item.price}, -1)">-</button>
                                <span>${count}</span>
                                <button class="btn-add" onclick="updateCart('${item.name}', ${item.price}, 1)">+</button>
                            </div>
                        ` : `
                            <button class="btn-add" onclick="updateCart('${item.name}', ${item.price}, 1)">Додати</button>
                        `}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateCart(name, price, delta) {
            if (!cart[name]) {
                cart[name] = { name, price, count: 0 };
            }
            cart[name].count += delta;
            if (cart[name].count <= 0) delete cart[name];
            
            updateMainButton();
            // Знаходимо активну категорію та перемальовуємо її
            const activeCat = document.querySelector('.category-btn.active').innerText;
            renderMenu(activeCat);
        }

        function updateMainButton() {
            const btn = document.getElementById('main-btn');
            const total = Object.values(cart).reduce((sum, item) => sum + (item.price * item.count), 0);
            if (total > 0) {
                btn.style.display = 'block';
                btn.innerText = `Оформити: ${total} грн`;
            } else {
                btn.style.display = 'none';
            }
        }

        function sendOrder() {
            const orderData = Object.values(cart);
            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }
    </script>
</body>
</html>
