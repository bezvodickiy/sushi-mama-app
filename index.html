<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sushi Mama Organic</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Raleway', sans-serif; background-color: #FCF9F1; color: #4A4941; margin: 0; padding: 0; }
        .categories { display: flex; overflow-x: auto; width: 100%; background: #FCF9F1; padding: 15px 5px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #E4E0D5; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .category-item { padding: 8px 20px; margin: 0 8px; background: transparent; white-space: nowrap; font-size: 13px; font-weight: 600; color: #4A4941; cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 1px; }
        .category-item.active { color: #2B463C; border-bottom: 2px solid #2B463C; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 15px; padding-bottom: 120px; }
        .product-card { width: 100%; max-width: 400px; background: #FFFFFF; border-radius: 0px; margin-bottom: 30px; overflow: hidden; box-shadow: 0 4px 15px rgba(43, 70, 60, 0.05); border: 1px solid #E4E0D5; }
        .product-image { width: 100%; height: 280px; object-fit: cover; }
        .product-info { padding: 20px; }
        .product-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; margin-bottom: 10px; color: #2B463C; text-transform: uppercase; }
        .product-desc { font-size: 13px; color: #7A7970; margin-bottom: 20px; line-height: 1.5; min-height: 40px; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; }
        .price-tag { background-color: #E8F0E5; padding: 6px 12px; border-radius: 4px; border: 1px solid #D1DED0; }
        .price { font-size: 18px; color: #2B463C; font-weight: 700; }
        .counter-container { display: flex; align-items: center; border: 1px solid #2B463C; border-radius: 4px; }
        .btn-count { background: transparent; border: none; color: #2B463C; width: 32px; height: 32px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .count-value { padding: 0 10px; font-weight: 700; font-size: 15px; color: #2B463C; }
        .add-initial { background: #2B463C; color: #FFFFFF; border: none; padding: 10px 20px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 13px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="categories" id="category-bar"><div class="category-item active" onclick="filterMenu('Всі', this)">Всі</div></div>
    <div class="container" id="product-container"></div>

    <script>
        let allProducts = [];
        let cart = {};
        const tg = window.Telegram.WebApp;

        window.onload = function() {
            cart = {};
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#FCF9F1');
            tg.setBackgroundColor('#FCF9F1');
            tg.MainButton.hide();
        };

        fetch('menu_data.json').then(res => res.json()).then(data => {
            allProducts = data;
            createCategoryButtons();
            renderProducts(allProducts);
        });

        function createCategoryButtons() {
            const bar = document.getElementById('category-bar');
            const categories = [...new Set(allProducts.map(p => p.category))];
            categories.forEach(cat => {
                const btn = document.createElement('div');
                btn.className = 'category-item'; btn.innerText = cat;
                btn.onclick = (e) => filterMenu(cat, e.target);
                bar.appendChild(btn);
            });
        }

        function renderProducts(products) {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            products.forEach(item => {
                const count = cart[item.name] ? cart[item.name].count : 0;
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `<img src="${item.image}" class="product-image"><div class="product-info"><div class="product-title">${item.name}</div><div class="product-desc">${item.description}</div><div class="product-footer"><div class="price-tag"><span class="price">${item.price} грн</span></div><div id="controls-${item.name.replace(/\s+/g, '')}">${count > 0 ? renderCounter(item.name, item.price, count) : `<button class="add-initial" onclick="changeCount('${item.name}', ${item.price}, 1)">Додати +</button>`}</div></div></div>`;
                container.appendChild(card);
            });
        }

        function renderCounter(name, price, count) {
            return `<div class="counter-container"><button class="btn-count" onclick="changeCount('${name}', ${price}, -1)">-</button><span class="count-value">${count}</span><button class="btn-count" onclick="changeCount('${name}', ${price}, 1)">+</button></div>`;
        }

        function changeCount(name, price, delta) {
            if (!cart[name]) cart[name] = { name, price, count: 0 };
            cart[name].count += delta;
            if (cart[name].count <= 0) delete cart[name];
            renderProducts(allProducts); // Оновлюємо візуал
            updateMainButton();
        }

        function updateMainButton() {
            const cartArray = Object.values(cart);
            if (cartArray.length === 0) tg.MainButton.hide();
            else {
                const total = cartArray.reduce((sum, item) => sum + (item.price * item.count), 0);
                tg.MainButton.setText(`ОФОРМИТИ ЗАМОВЛЕННЯ — ${total} грн`);
                tg.MainButton.show();
            }
        tg.onEvent('mainButtonClicked', function() {
            // Робимо кнопку знову активною на випадок залипання
            tg.MainButton.showProgress();
            
            const data = JSON.stringify(Object.values(cart));
            
            // Відправляємо дані
            tg.sendData(data); 
            
            // Очищуємо кошик і закриваємо
            cart = {};
            setTimeout(() => {
                tg.MainButton.hideProgress();
                tg.close();
            }, 300);
        });

        function filterMenu(category, element) {
            document.querySelectorAll('.category-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderProducts(category === 'Всі' ? allProducts : allProducts.filter(p => p.category === category));
        }
    </script>
</body>
</html>
